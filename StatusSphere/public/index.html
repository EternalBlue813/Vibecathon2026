<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatusSphere | Real-Time Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header class="main-header">
            <div class="logo-area">
                <div class="pulse-icon"></div>
                <h1>Status<span class="highlight">Sphere</span></h1>
            </div>
            <div class="status-summary">
                <span id="global-status">All Systems Operational</span>
                <div class="live-indicator">
                    <span class="dot"></span> LIVE
                </div>
            </div>
        </header>

        <main>
            <section class="tile-section" aria-label="Banks">
                <h2 class="section-heading">Banks</h2>
                <div class="tile-grid" id="grid-banks"></div>
            </section>

            <section class="tile-section" aria-label="Cloud Providers">
                <h2 class="section-heading">Cloud Providers</h2>
                <div class="tile-grid" id="grid-cloud"></div>
            </section>

            <section class="tile-section" aria-label="CDN Providers">
                <h2 class="section-heading">CDN &amp; Edge</h2>
                <div class="tile-grid" id="grid-cdn"></div>
            </section>
        </main>

        <div class="controls-area">
            <h3>Simulation Controls</h3>
            <div class="button-group" id="sim-buttons"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
