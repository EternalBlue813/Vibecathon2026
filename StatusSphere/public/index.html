<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatusSphere | Real-Time Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Breaking-news ticker -->
    <div class="ticker-bar" aria-live="polite" aria-label="Status headline">
        <span class="ticker-label">LIVE</span>
        <div class="ticker-track">
            <span class="ticker-text" id="ticker-text">Loading status headline...</span>
        </div>
    </div>

    <div class="app-container">
        <header class="main-header">
            <div class="logo-area">
                <div class="pulse-icon"></div>
                <h1>Status<span class="highlight">Sphere</span></h1>
            </div>
            <div class="status-summary">
                <span id="global-status">All Systems Operational</span>
                <div class="live-indicator">
                    <span class="dot"></span> LIVE
                </div>
            </div>
        </header>

        <!-- Outage summary -->
        <section class="outage-summary" id="outage-summary" aria-live="polite">
            <p class="outage-text" id="outage-text">Checking service status...</p>
        </section>

        <!-- Inline ask bar -->
        <div class="ask-bar">
            <form class="ask-form" id="ask-form" autocomplete="off">
                <input type="text" class="ask-input" id="ask-input" placeholder="Ask StatusSphere AI about any service..." maxlength="500" />
                <button type="submit" class="ask-send" aria-label="Ask">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
            <div class="ask-response hidden" id="ask-response"></div>
        </div>

        <main>
            <section class="tile-section" aria-label="Banks">
                <h2 class="section-heading">Banks</h2>
                <div class="tile-grid" id="grid-banks"></div>
            </section>

            <section class="tile-section" aria-label="Cloud Providers">
                <h2 class="section-heading">Cloud Providers</h2>
                <div class="tile-grid" id="grid-cloud"></div>
            </section>

            <section class="tile-section" aria-label="CDN Providers">
                <h2 class="section-heading">CDN &amp; Edge</h2>
                <div class="tile-grid" id="grid-cdn"></div>
            </section>
        </main>

    </div>

    <!-- Chat widget -->
    <button class="chat-fab" id="chat-fab" aria-label="Open chat">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    </button>

    <div class="chat-panel hidden" id="chat-panel">
        <div class="chat-header">
            <span class="chat-title">StatusSphere AI</span>
            <button class="chat-close" id="chat-close" aria-label="Close chat">&times;</button>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="chat-msg assistant">
                <p>Hi! I'm StatusSphere AI. Ask me about the status of any monitored service — banks, cloud providers, or CDN.</p>
            </div>
        </div>
        <form class="chat-input-row" id="chat-form" autocomplete="off">
            <input type="text" class="chat-input" id="chat-input" placeholder="Ask about service status..." maxlength="500" />
            <button type="submit" class="chat-send" aria-label="Send">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </form>
    </div>

    <script src="app.js"></script>
</body>

</html>
