<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatusSphere | Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="detail-container">
        <a href="index.html" class="back-link">&larr; Back to Dashboard</a>

        <div class="detail-header">
            <h1 id="entity-name">Loading...</h1>
            <span class="detail-status-badge unknown" id="entity-badge">Unknown</span>
        </div>

        <section class="detail-section" aria-label="Uptime Chart">
            <h2>Uptime / Downtime History</h2>
            <div class="chart-container">
                <canvas id="history-chart"></canvas>
            </div>
        </section>

        <section class="detail-section" id="screenshot-section" aria-label="Screenshot">
            <h2>Screenshot (when down)</h2>
            <div class="screenshot-area" id="screenshot-area">
                <p class="screenshot-placeholder">No outage screenshot available at this time.</p>
            </div>
        </section>

        <section class="detail-section" aria-label="AI Summary">
            <h2>AI Summary</h2>
            <p class="summary-text" id="llm-summary">
                No active incidents to summarize. The service appears to be operating normally.
            </p>
        </section>

        <section class="detail-section" aria-label="News Feed">
            <h2>Media Reports</h2>
            <ul class="news-list" id="news-list">
                <li class="no-news">Fetching news...</li>
            </ul>
        </section>
    </div>
    <script src="detail.js"></script>
</body>

</html>
